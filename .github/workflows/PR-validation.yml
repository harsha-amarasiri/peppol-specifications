name: PR Validation

on:
  pull_request:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Set up Maven 3.9.9
        uses: s4u/setup-maven-action@v1.12.0
        with:
          maven-version: '3.9.9'

      - name: Verify versions
        run: |
          java -version
          mvn -version

      - name: Full verify
        run: mvn -B --no-transfer-progress clean verify

      - name: Check for deprecation warnings
        run: |
          mvn -B --no-transfer-progress clean compile \
            -Dmaven.compiler.compilerArgument=-Xlint:deprecation \
            2>&1 | tee build.log
          if grep -q "uses or overrides a deprecated API" build.log; then
            echo "❌ Deprecation warnings found"
            grep "uses or overrides a deprecated API" build.log
            exit 1
          else
            echo "✅ No deprecation warnings"
          fi